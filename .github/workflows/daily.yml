name: 每日签到

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *'

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run sign in
        env:
          BILIBILI_COOKIE: ${{ secrets.BILIBILI_COOKIE }}
          NETEASE_COOKIE: ${{ secrets.NETEASE_COOKIE }}
          TXVIDEO_COOKIE: ${{ secrets.TXVIDEO_COOKIE }}
          WPS_COOKIE: ${{ secrets.WPS_COOKIE }}
          IQIYI_COOKIE: ${{ secrets.IQIYI_COOKIE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
        run: |
          python3 - <<END
          import json
          import os
          # 从环境变量读取，空值自动为None
          config = {
            "notify": {
              "type": "telegram",
              "token": os.getenv("TELEGRAM_BOT_TOKEN") or None,
              "user_id": os.getenv("TELEGRAM_USER_ID") or None
            },
            "bilibili": {
              "cookie": os.getenv("BILIBILI_COOKIE") or None
            },
            "netease": {
              "cookie": os.getenv("NETEASE_COOKIE") or None
            },
            "txvideo": {
              "cookie": os.getenv("TXVIDEO_COOKIE") or None
            },
            "wps": {
              "cookie": os.getenv("WPS_COOKIE") or None
            },
            "iqiyi": {
              "cookie": os.getenv("IQIYI_COOKIE") or None
            }
          }
          # Python原生json导出，自动处理所有特殊字符
          with open("config.json", "w", encoding="utf-8") as f:
              json.dump(config, f, ensure_ascii=False, indent=2)
          END
          python run.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sign-logs
          path: sign.log
